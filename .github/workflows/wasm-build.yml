name: Build WASM Binary
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Emscripten (WASM Compiler)
        uses: mymindstorm/setup-emsdk@v14

      - name: Install Dependencies
        run: npm ci

      - name: Generate C Source
        run: |
          # This command triggers the llparse generator to create llhttp.c and llhttp.h
          npm run build
          
          # Check if files exist to prevent the previous "No such file" error
          ls -R build/

      - name: Build WASM
        run: |
          # -Ibuild tells emcc to look in the build folder for headers like llhttp.h
          # We include api.c from the src/native folder if it's not in build/
          emcc build/llhttp.c src/native/api.c \
            -Ibuild \
            -Isrc/native \
            -Os \
            -s WASM=1 \
            -s SIDE_MODULE=1 \
            -s EXPORTED_FUNCTIONS='["_llhttp_init", "_llhttp_execute", "_llhttp_settings_init"]' \
            -o llhttp.wasm

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llhttp-wasm-binary
          path: llhttp.wasm
